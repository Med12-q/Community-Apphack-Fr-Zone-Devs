<style>
:root{
    --bg:#000;
    --accent:#ff0000;
    --text:#eaeaea;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
}

/* VIDEO */
.video-banner{
    width:95%;
    max-width:900px;
    aspect-ratio:16/9;
    border:3px solid red;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:10px;
    box-shadow:0 0 20px red;
}

/* LOGO WHATSAPP CENTRÉ */
.whatsapp-logo{
    width:90px;
    margin:15px auto;
    display:block;
    filter: drop-shadow(0 0 10px red)
            drop-shadow(0 0 25px red)
            drop-shadow(0 0 50px red);
}
.whatsapp-logo svg{
    width:100%;
}

/* CARD */
.card{
    width:100%;
    max-width:500px;
    background:#0a0a0a;
    border:2px solid red;
    border-radius:12px;
    padding:20px;
    box-shadow:0 0 20px red;
}

/* HEADER */
.header{text-align:center;margin-bottom:10px;}
.header h1{font-size:16px;}

/* PROGRESS */
.progress{height:4px;background:#111;margin-bottom:15px;}
.bar{height:100%;background:red;width:33%;}

/* STEPS */
.step{display:none;}
.step.active{display:block;}

/* INPUT */
input,textarea,select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #222;
    background:#050505;
    color:white;
}

/* BUTTON */
.actions{display:flex;gap:10px;margin-top:10px;}
button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.next{
    background:red;
    color:white;
    box-shadow:0 0 10px red;
}
.back{
    background:#111;
    color:#aaa;
}

/* DEV SECTION */
.dev-section{
    margin-top:20px;
    text-align:center;
}

.dev{
    margin:15px 0;
}

/* LOGO DEV */
.dev-logo{
    width:60px;
    margin:10px auto;
    filter: drop-shadow(0 0 10px red)
            drop-shadow(0 0 25px red);
}
.dev-logo svg{width:100%;}

/* SIGNATURE */
.signature{
    margin-top:15px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

</div>

<script>
const steps=document.querySelectorAll(".step");
let current=0;
const bar=document.getElementById("bar");

function updateBar(){
    bar.style.width=((current+1)/steps.length)*100+"%";
}

document.querySelectorAll(".next").forEach(btn=>{
btn.onclick=()=>{
    const inputs=steps[current].querySelectorAll("input,textarea,select");
    for(let i=0;i<inputs.length;i++){
        if(inputs[i].value.trim()===""){
            alert("Remplis tous les champs !");
            return;
        }
    }
    if(current<steps.length-1){
        steps[current].classList.remove("active");
        current++;
        steps[current].classList.add("active");
        updateBar();
    }
}
});

document.querySelectorAll(".back").forEach(btn=>{
btn.onclick=()=>{
    if(current>0){
        steps[current].classList.remove("active");
        current--;
        steps[current].classList.add("active");
        updateBar();
    }
}
});

const music=document.getElementById("music");
document.addEventListener("click",()=>{
    music.play().catch(()=>{});
},{once:true});

const form=document.getElementById("myForm");
form.addEventListener("submit",function(e){
    e.preventDefault();
    fetch(form.action,{
        method:"POST",
        body:new FormData(form)
    }).then(()=>{
        window.location.href="https://chat.whatsapp.com/LRkMdspT8oLDT5MBNESu7a";
    });
});
</script>
