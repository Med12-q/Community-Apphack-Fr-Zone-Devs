<style>
:root{
    --bg:#000000; 
    --card:#111113;
    --accent:#ff2a2a; 
    --text:#eaeaea;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif;}
body {
    background: var(--bg);
    color: var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    overflow-x: hidden;
}

/* VIDEO RECTANGULAIRE EN HAUT */
.video-banner{
    width:90%;
    max-width:900px;
    height:auto;
    aspect-ratio:16/9;
    margin-bottom:30px;
    border-radius:16px;
    border:4px solid var(--accent);
    box-shadow:0 0 20px var(--accent),0 0 30px rgba(255,42,42,0.4) inset;
    overflow:hidden;
    position:relative;
}
.video-banner video{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:12px;
    filter:brightness(1.2);
}

/* CARD */
.card{
    width:100%;
    max-width:500px;
    background: rgba(17,17,19,0.85);
    border:2px solid var(--accent);
    box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(255,42,42,0.2) inset;
    backdrop-filter:blur(16px);
    padding:20px;
    border-radius:16px;
}

/* HEADER */
.header{text-align:center;margin-bottom:15px;}
.header h1{
    font-size:18px; /* titre réduit et direct */
    letter-spacing:0.5px;
}
.logo{
    width:60px;
    margin:auto;
    margin-bottom:10px;
    display:block;
    filter: drop-shadow(0 0 4px var(--accent)) drop-shadow(0 0 10px var(--accent));
    animation: pulse 1.5s infinite;
}
@keyframes pulse{
    0%{filter: drop-shadow(0 0 3px var(--accent)) drop-shadow(0 0 8px var(--accent));}
    50%{filter: drop-shadow(0 0 6px var(--accent)) drop-shadow(0 0 14px var(--accent));}
    100%{filter: drop-shadow(0 0 3px var(--accent)) drop-shadow(0 0 8px var(--accent));}
}

/* PROGRESS */
.progress{height:4px;background:#222;border-radius:10px;overflow:hidden;margin-bottom:15px;}
.bar{height:100%;width:33%;background:var(--accent);transition:0.4s;}

/* STEPS */
.step{display:none;}
.step.active{display:block;animation:fade 0.4s;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;}}

/* INPUTS */
input,textarea,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #222;
    background:#0f0f10;
    color:white;
    font-size:14px;
}
input:focus,textarea:focus{border-color:var(--accent);outline:none;}

/* BUTTONS */
.actions{display:flex;gap:10px;margin-top:12px;}
button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px;}
.next{background:var(--accent);color:white;}
.back{background:#222;color:#ccc;}

/* PROFILE LEVEL */
.level{text-align:center;font-size:12px;margin-top:5px;color:var(--accent);}

/* SIGNATURE */
.signature{
    margin-top:20px;
    font-size:12px;
    text-align:center;
    color:#aaa;
    line-height:1.5;
}
.contacts{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
}
.contact-line{
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:center;
}
.wa-icon{
    width:20px;
    height:20px;
    filter: drop-shadow(0 0 5px var(--accent)) drop-shadow(0 0 10px var(--accent));
    cursor:pointer;
    animation: pulse 1.5s infinite;
}

/* RESPONSIVE */
@media (max-width:600px){
    .card{padding:15px;}
    .logo{width:50px;}
    input,textarea,select{font-size:13px;}
    button{font-size:13px;padding:9px;}
    .video-banner{width:95%; aspect-ratio:16/9;}
}
</style>

<!-- JS STEPS + LEVEL + PROTECTION CODE SOURCE -->
<script>
const steps=document.querySelectorAll(".step");let current=0;const bar=document.getElementById("bar");
function updateBar(){bar.style.width=((current+1)/steps.length)*100+"%";}
document.querySelectorAll(".next").forEach(btn=>{btn.onclick=()=>{
    const inputs=steps[current].querySelectorAll("input,textarea,select");
    for(let i=0;i<inputs.length;i++){if(inputs[i].hasAttribute("required")&&inputs[i].value.trim()===""){alert("Veuillez remplir tous les champs.");inputs[i].focus();return;}}
    if(current<steps.length-1){steps[current].classList.remove("active");current++;steps[current].classList.add("active");updateBar();}
}});
document.querySelectorAll(".back").forEach(btn=>{btn.onclick=()=>{
    if(current>0){steps[current].classList.remove("active");current--;steps[current].classList.add("active");updateBar();}
}});
const niveau=document.getElementById("niveau");const exp=document.getElementById("exp");const levelText=document.getElementById("levelText");
function updateLevel(){let score=(niveau.value*30)+(exp.value.length/5);if(score<40) levelText.textContent="Profil: Faible"; else if(score<70) levelText.textContent="Profil: Moyen"; else levelText.textContent="Profil: Élevé";}
niveau.onchange=updateLevel; exp.oninput=updateLevel;
